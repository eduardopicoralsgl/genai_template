name: "router routes to LLM when use_llm is true"
description: "router_node should return 'llm' when input.use_llm is true"
tags: [unit, router]

execution:
  mode: single_node
  node: "genai_template.orchestration.nodes.router:router_node"

initial_state:
  input:
    use_llm: true

assertions:
  fields:
    - path: __return__
      expected: "llm"
